name: Publish Laravel Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  buildandPush:
    name: Build Images
    runs-on: ubuntu-latest
   
    steps:
      -name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}



    
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Image 1
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cockpitApp/docker/production/nginx/Dockerfile
          push: true
          tags: nginx/app:latest

      
  push_to_regestry:
    name: push to Azure
    runs-on: ubuntu-latest
    permissions: 
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out of the repo
        uses: actions/checkout@v4
      - name: Log into Azure
        run: docker build . --file ./cockpitApp/docker/common/php-fpm/Dockerfile --tag php-fpm:$(date +%s)
    
      

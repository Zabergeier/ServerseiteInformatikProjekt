name: Docker

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
     
      
     

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Combiimage
        uses: docker/build-push-action@v5
        with:
          context: ./cockpitApp
          push: true
          tags: ghcr.io/zabergeier/php-fpm:latest
          file: ./cockpitApp/docker/k3s/Dockerfile

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./cockpitApp
          push: true
          tags: ghcr.io/zabergeier/nginx-k3s:latest
          file: ./cockpitApp/docker/production/nginx/Dockerfile
          target: production 

      - name: Build & Push PHP
        uses: docker/build-push-action@v5
        with:
          context: ./cockpitApp
          push: true
          tags: ghcr.io/zabergeier/php-fpm-k3s:latest
          file: ./cockpitApp/docker/common/php-fpm/Dockerfile
          
    
  
